name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason (e.g. "notes synced")'
        required: false
        default: 'manual rebuild'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # Pull project config (.vercel/project.json) so vercel build and
      # vercel deploy know which Vercel project they are targeting.
      - name: Pull Vercel project config
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # Build runs on the GitHub Actions runner (not Vercel servers), so
      # Vercel "sensitive" env vars are not available via vercel pull.
      # Pass them explicitly from GitHub secrets instead.
      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          # Storage provider — set STORAGE_PROVIDER secret to 'google_drive' or 's3'
          STORAGE_PROVIDER: ${{ secrets.STORAGE_PROVIDER }}
          # Google Drive (used when STORAGE_PROVIDER=google_drive)
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          # AWS S3 (used when STORAGE_PROVIDER=s3)
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          NEXT_PUBLIC_BASE_PATH: ${{ secrets.NEXT_PUBLIC_BASE_PATH }}
          NEXT_PUBLIC_SITE_TITLE: ${{ secrets.NEXT_PUBLIC_SITE_TITLE }}

      - name: Debug build output
        run: |
          echo "=== content/ MDX count ==="
          for d in content/*/; do echo "$d: $(find "$d" -name '*.mdx' 2>/dev/null | wc -l) mdx files"; done 2>/dev/null || echo "(no content/)"
          echo "=== .source/ files ==="
          ls .source/ 2>/dev/null || echo "(no .source/)"
          echo "=== .source/index.ts (first 40 lines) ==="
          head -40 .source/index.ts 2>/dev/null || echo "(no .source/index.ts)"
          echo "=== .vercel/output/ top-level ==="
          ls .vercel/output/ 2>/dev/null || echo "(no .vercel/output/)"
          echo "=== .vercel/output/functions/ ==="
          ls .vercel/output/functions/ 2>/dev/null || echo "(no functions/)"
          echo "=== config.json routes with notes|docs ==="
          python3 -c "
          import json, sys
          try:
              c = json.load(open('.vercel/output/config.json'))
              for r in c.get('routes', []):
                  s = str(r)
                  if 'notes' in s or '/docs' in s:
                      print(r)
          except Exception as e:
              print('error:', e)
          " 2>/dev/null || echo "(no config.json)"

      - name: Deploy
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
